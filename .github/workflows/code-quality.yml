name: Code quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: TypeScript and ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test payment contract helpers
        run: npm run test:payment-contract

      - name: Test auth contract helpers
        run: npm run test:auth-contract

      - name: Lint
        run: npm run lint

      - name: Validate database schema snapshots
        run: npm run db:schema:validate

      - name: Validate repository diff
        shell: bash
        run: |
          if git grep -nI -E '[[:blank:]]+$' -- ':!package-lock.json'; then
            echo "Trailing whitespace found."
            exit 1
          fi
